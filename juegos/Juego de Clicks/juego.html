<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reto Retro Arcade</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #111 40%, #000 100%);
  font-family: 'Press Start 2P', cursive;
  color:#00ffcc;
}

.card{
  background:#111;
  padding:30px;
  border:3px solid #00ffcc;
  border-radius:15px;
  text-align:center;
  width:380px;
  box-shadow: 0 0 20px #00ffcc;
}

h1{
  font-size:16px;
  margin-bottom:20px;
  text-shadow:0 0 10px #00ffcc;
}

p{
  font-size:10px;
}

input{
  margin-top:15px;
  padding:8px;
  width:80%;
  border:none;
  border-radius:5px;
  text-align:center;
  font-family:inherit;
}

button{
  margin-top:15px;
  padding:8px 12px;
  border:none;
  border-radius:5px;
  background:#ff0080;
  color:white;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 0 10px #ff0080;
}

button:hover{
  background:#ff3399;
}

#mensaje{
  margin-top:15px;
  min-height:40px;
  font-size:10px;
}

.stats{
  margin-top:15px;
  font-size:9px;
}
</style>
</head>

<body>

<div class="card">
  <h1>🎮 RETO ARCADE</h1>
  <p>Adivina el número</p>
  <p id="rango">Rango: 1 - 50</p>

  <input type="number" id="numero" placeholder="Ingresa número">
  <br>
  <button onclick="verificar()">Intentar</button>
  <button onclick="reiniciar()">Reiniciar</button>
  <button onclick="modoDificil()">Modo Difícil</button>

  <div id="mensaje"></div>

  <div class="stats">
    Intentos: <span id="intentos">0</span><br>
    Récord: <span id="record">--</span>
  </div>
</div>

<script>
let max = 50;
let numeroSecreto = generarNumero();
let intentos = 0;
let record = null;

function generarNumero(){
  return Math.floor(Math.random() * max) + 1;
}

function verificar(){
  const valor = Number(document.getElementById("numero").value);
  if(!valor) return;

  intentos++;
  document.getElementById("intentos").textContent = intentos;

  if(valor === numeroSecreto){
    document.getElementById("mensaje").innerHTML =
      "🔥 ¡VICTORIA! Mentalidad competitiva desbloqueada.";
    
    if(record === null || intentos < record){
      record = intentos;
      document.getElementById("record").textContent = record;
    }
  }
  else if(valor < numeroSecreto){
    document.getElementById("mensaje").innerHTML = "⬆️ MÁS ALTO";
  }
  else{
    document.getElementById("mensaje").innerHTML = "⬇️ MÁS BAJO";
  }
}

function reiniciar(){
  intentos = 0;
  numeroSecreto = generarNumero();
  document.getElementById("intentos").textContent = 0;
  document.getElementById("mensaje").innerHTML = "";
  document.getElementById("numero").value = "";
}

function modoDificil(){
  max = 100;
  document.getElementById("rango").textContent = "Rango: 1 - 100";
  reiniciar();
}
</script>

</body>
</html>
