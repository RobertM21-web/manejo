<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
  	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  	<title>Flappy Bird</title>
  	<script type="application/javascript" src="WeixinApi.js"></script>
	<script type='application/javascript' src="fastclick.js"></script>

	<style>
		@font-face {
			font-family: "Press Start 2P";
			src: url("PressStart2P.ttf") format('truetype');
		}
		*{
			cursor: pointer;
			-moz-user-select: none;
			-webkit-user-select: none;
			-ms-user-select: none;
			-webkit-tap-highlight-color: transparent;
		}
		::selection{ background: transparent; }
		::-moz-selection{ background: transparent; }

		.option, .mode{
			display: inline-block;
			width: 70px;
			height: 20px;
			background: rgba(255, 255, 255, 0.6);
			position: absolute;
			top: 2px;
			text-align: center;
			font-size: 11px;
			font-family: "Press Start 2P";
			padding-top: 5px;
			z-index: 2;
		}
		.option:hover, .mode:hover{ background: #fff; }

		#modes{ position: absolute; top: 28px; }
		#easy, #flashlight{ left: 2px; }
		#normal, #hidden{ left: 74px; }
		#hard{ left: 146px; }

		canvas { -webkit-tap-highlight-color: transparent; }

		/* 🔹 Botón de regreso */
		.back-button {
			position: fixed;
			bottom: 20px;
			left: 20px;
			z-index: 1000;
			background: #000;
			color: white;
			border-radius: 50%;
			width: 55px;
			height: 55px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-decoration: none;
			box-shadow: 0 4px 8px rgba(0,0,0,0.3);
			transition: transform 0.2s;
		}
		.back-button:hover {
			transform: scale(1.1);
			background: #222;
		}
		
		.back-button {
			position: fixed;
			top: 90px;
			left: 40px;
			z-index: 1000;

			background: linear-gradient(145deg, #ffd700, #ffb700);
			color: #2c1b07;
			border: 3px solid #8b6513;

			width: 60px;
			height: 60px;
			border-radius: 50%;

			display: flex;
			align-items: center;
			justify-content: center;

			font-size: 28px;
			font-weight: bold;
			text-decoration: none;
			cursor: pointer;

			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4),
						0 0 15px rgba(255, 215, 0, 0.6);
			transition: all 0.3s ease;
		}

		.back-button:hover {
			background: linear-gradient(145deg, #ffed4e, #ffc845);
			transform: scale(1.15);
			box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5),
						0 0 20px rgba(255, 215, 0, 0.8);
		}
		
	</style>
</head>

<body style="padding:0;margin:0;outline:0;overflow:hidden">
	<canvas id="canvas">你的浏览器太老了 =_=||</canvas>

	<div id="easy" class="option" style="box-shadow:0 0 0 2px #165CF3">easy</div>
	<div id="normal" class="option">normal</div>
	<div id="hard" class="option">hard</div>

	<br/>
	<div id="modes">
		<div id="flashlight" class="mode">FL</div>
	</div>

	<!-- 🔹 Botón de regreso -->
	<a href="/integrantes/persona5.html" class="back-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </a>

	<!-- 🔹 Eliminado el Fork me on GitHub -->
	<script type="application/javascript" src="fb.js"></script>
</body>
</html>
