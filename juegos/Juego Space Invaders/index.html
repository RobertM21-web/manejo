<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders — UTA</title>
  <link rel="icon" type="image/png" href="../assets/img/icono.png">

</head>
<body>

    <h1 class="title">Space Invaders</h1>
    <canvas id="game" width="480" height="640" aria-label="Canvas del juego"></canvas>

      <div class="controls">

        <span>•</span>

      <button id="restart" class="btn" hidden>Reiniciar</button>
      <a class="btn secondary" href="/integrantes/persona1.html">Volver</a>
    </section>
  </main>
  <script src="game.js"></script>

</html>
